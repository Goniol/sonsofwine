  .chip {

  /* WINE CARDS */

  .stock-badge {

        <div class="modal-info-row">
          <span class="label">Livraison estimée</span>
          <span>48h • Paris</span>
        </div>
      </div>
      <button class="btn-primary" onclick="confirmOrder()">✓ Confirmer</button>
      <button class="btn-secondary" onclick="closeModal()">Annuler</button>

    <div id="modal-content-post" style="display:none; text-align:center;">
      <div class="modal-check">🎉</div>

      <div class="modal-sub" style="text-align:center; margin-bottom:24px">Vous recevrez une confirmation par email.<br>Livraison dans 48h.</div>

<script>
const wines = [
  { id:1, name:"Gevrey-Chambertin 1er Cru", domaine:"Domaine Rossignol-Trapet", appellation:"Bourgogne", type:"Rouge", color:"rouge", price:48, stock:24, promo:false },
  { id:2, name:"Puligny-Montrachet", domaine:"Maison Louis Jadot", appellation:"Bourgogne", type:"Blanc", color:"blanc", price:55, stock:6, promo:false },
  { id:3, name:"Bandol Rosé", domaine:"Château Pibarnon", appellation:"Provence", type:"Rosé", color:"rosé", price:22, stock:48, promo:true },
  { id:4, name:"Champagne Brut Millésimé", domaine:"Gosset Grande Réserve", appellation:"Champagne", type:"Pétillant", color:"petillant", price:62, stock:0, promo:false },
  { id:5, name:"Saint-Émilion Grand Cru", domaine:"Château Figeac", appellation:"Bordeaux", type:"Rouge", color:"rouge", price:95, stock:12, promo:false },
  { id:6, name:"Sancerre Blanc", domaine:"Henri Bourgeois", appellation:"Loire", type:"Blanc", color:"blanc", price:28, stock:36, promo:true },
  { id:7, name:"Côtes de Provence", domaine:"Minuty M de Minuty", appellation:"Provence", type:"Rosé", color:"rosé", price:18, stock:60, promo:false },
  { id:8, name:"Crémant d'Alsace", domaine:"Wolfberger", appellation:"Alsace", type:"Pétillant", color:"petillant", price:14, stock:30, promo:true },
];

let cart = {};
let currentFilter = 'Tous';
let searchQuery = '';

function stockLabel(q) {
  if (q === 0) return { cls: 'stock-out', txt: 'Épuisé' };
  if (q <= 12) return { cls: 'stock-low', txt: `${q} rest.` };
  return { cls: 'stock-ok', txt: `${q} en stock` };
}

function renderCatalogue() {
  const list = document.getElementById('wine-list');
  let filtered = wines.filter(w => {
    const matchFilter = currentFilter === 'Tous' || w.type === currentFilter || (currentFilter === 'Promo' && w.promo);
    const matchSearch = w.name.toLowerCase().includes(searchQuery) || w.domaine.toLowerCase().includes(searchQuery);
    return matchFilter && matchSearch;
  });
  list.innerHTML = filtered.map(w => {
    const s = stockLabel(w.stock);
    const qty = cart[w.id] || 0;
    return `<div class="wine-card" data-id="${w.id}">
      <div class="wine-color-bar ${w.color}"></div>
      <div class="wine-info">
        <div class="wine-appellation">${w.appellation}${w.promo ? ' · 🏷️ Promo' : ''}</div>
        <div class="wine-name">${w.name}</div>
        <div class="wine-domaine">${w.domaine}</div>
        <div class="wine-meta">
          <div class="wine-price">${w.price} €<span>/bt</span></div>
          <span class="stock-badge ${s.cls}">${s.txt}</span>
        </div>
      </div>
      <div class="wine-actions">
        <div class="qty-ctrl">
          <button class="qty-btn" onclick="changeQty(${w.id}, -1)" ${qty === 0 ? 'style="opacity:0.3"' : ''}>−</button>
          <span class="qty-val" id="qty-${w.id}">${qty}</span>
          <button class="qty-btn" onclick="changeQty(${w.id}, 1)" ${w.stock === 0 ? 'disabled style="opacity:0.3"' : ''}>+</button>
        </div>
      </div>
    </div>`;
  }).join('') || '<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-title">Aucun résultat</div><div class="empty-sub">Essayez un autre filtre</div></div>';
}

function changeQty(id, delta) {
  const wine = wines.find(w => w.id === id);
  const cur = cart[id] || 0;
  const next = Math.max(0, Math.min(cur + delta, wine.stock));
  if (next === 0) delete cart[id]; else cart[id] = next;
  document.getElementById(`qty-${id}`).textContent = next;
  const btn = document.querySelector(`[data-id="${id}"] .qty-btn`);
  updateCartUI();
}

function updateCartUI() {
  const total = Object.entries(cart).reduce((s, [id, q]) => s + wines.find(w => w.id == id).price * q, 0);
  const count = Object.values(cart).reduce((s, q) => s + q, 0);
  const bar = document.getElementById('cart-bar');
  const badge = document.getElementById('cart-badge');
  document.getElementById('cart-bar-qty').textContent = `${count} article${count > 1 ? 's' : ''}`;
  document.getElementById('cart-bar-total').textContent = `${total.toLocaleString('fr-FR')} €`;
  document.getElementById('cart-bar-qty').textContent = `${count} article${count > 1 ? 's' : ''}`;
  if (count > 0) {
    bar.classList.remove('hidden');
    badge.style.display = 'inline';
    badge.textContent = count;
  } else {
    bar.classList.add('hidden');
    badge.style.display = 'none';
  }
}

function renderCart() {
  const list = document.getElementById('cart-items-list');
  const bottom = document.getElementById('commande-bottom');
  const entries = Object.entries(cart);
  if (entries.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">🛒</div><div class="empty-title">Panier vide</div><div class="empty-sub">Ajoutez des vins depuis le catalogue</div></div>`;
    bottom.style.display = 'none';
    return;
  }
  let total = 0;
  list.innerHTML = entries.map(([id, qty]) => {
    const w = wines.find(w => w.id == id);
    const sub = w.price * qty;
    total += sub;
    return `<div class="order-item">
      <div class="oi-left">
        <div class="oi-name">${w.name}</div>
        <div class="oi-detail">${w.domaine}</div>
      </div>
      <div class="oi-right">
        <div class="oi-qty">${qty} × ${w.price} €</div>
        <div class="oi-price">${sub} €</div>
      </div>
    </div>`;
  }).join('');
  document.getElementById('cart-total-display').textContent = `${total.toLocaleString('fr-FR')} €`;
  bottom.style.display = 'block';
}

function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderCatalogue();
}

function filterWines(q) {
  searchQuery = q.toLowerCase();
  renderCatalogue();
}

function goTo(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById(`page-${page}`).classList.add('active');
  document.getElementById(`nav-${page}`).classList.add('active');
  if (page === 'commande') renderCart();
}

function showConfirm() {
  const count = Object.values(cart).reduce((s, q) => s + q, 0);
  const total = Object.entries(cart).reduce((s, [id, q]) => s + wines.find(w => w.id == id).price * q, 0);
  document.getElementById('modal-articles').textContent = `${count} bouteille${count > 1 ? 's' : ''}`;
  document.getElementById('modal-total').textContent = `${total.toLocaleString('fr-FR')} €`;
  document.getElementById('modal-content-pre').style.display = 'block';
  document.getElementById('modal-content-post').style.display = 'none';
  document.getElementById('modal-confirm').classList.add('show');
}

function confirmOrder() {
  document.getElementById('modal-content-pre').style.display = 'none';
  document.getElementById('modal-content-post').style.display = 'block';
}

function afterConfirm() {
  cart = {};
  updateCartUI();
  renderCatalogue();
  closeModal();
  goTo('suivi');
}

function closeModal() {
  document.getElementById('modal-confirm').classList.remove('show');
}

function showNotif() {
  alert('🔔 Notification : Votre commande #CMD-089 est en transit !');
}

// Init
renderCatalogue();
</script>
